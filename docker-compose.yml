services:
  webdav-cold-backup:
    image: ghcr.io/ccawmiku/webdav-cold-backup:v1.1.1
    container_name: webdav-cold-backup
    restart: unless-stopped
    # 当前群晖管理员账号的实际 UID:GID。
    user: "1026:100"
    ports:
      - "19001:8080"
    environment:
      WCB_LISTEN_ADDR: 0.0.0.0:8080
      WCB_CONFIG_DIR: /config
      WCB_CACHE_DIR: /cache
      WCB_SOURCE_ROOT: /sources
      WCB_RESTORE_ROOT: /restore
    volumes:
      - /volume1/docker/webdav-cold-backup/config:/config
      - /volume1/docker/webdav-cold-backup/cache:/cache
      - /volume1:/sources:ro
      - /volume1/docker/webdav-cold-backup/restore:/restore
